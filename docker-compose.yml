services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentserver
      POSTGRES_PASSWORD: agentserver
      POSTGRES_DB: agentserver
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Create the llmproxy database on the shared PostgreSQL instance.
  postgres-init-llmproxy:
    image: postgres:16-alpine
    depends_on:
      - postgres
    restart: "no"
    entrypoint: >
      sh -c "
        until pg_isready -h postgres -U agentserver; do sleep 1; done
        PGPASSWORD=agentserver psql -h postgres -U agentserver -tc \"SELECT 1 FROM pg_database WHERE datname = 'llmproxy'\" | grep -q 1 ||
        PGPASSWORD=agentserver psql -h postgres -U agentserver -c 'CREATE DATABASE llmproxy'
      "

  server:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://agentserver:agentserver@postgres:5432/agentserver?sslmode=disable"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      ANTHROPIC_BASE_URL: "${ANTHROPIC_BASE_URL:-}"
      AGENT_IMAGE: "${AGENT_IMAGE:-agentserver-agent:latest}"
      OPENCODE_CONFIG_CONTENT: '{"provider":{"anthropic":{"options":{"baseURL":"http://llmproxy:8081/v1"}}}}'
      CREDPROXY_ENCRYPTION_KEY: "${CREDPROXY_ENCRYPTION_KEY:-}"
      CREDPROXY_PUBLIC_URL: "http://credentialproxy:8083"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres

  llmproxy:
    build:
      context: .
      dockerfile: Dockerfile.llmproxy
    ports:
      - "8081:8081"
    environment:
      LLMPROXY_LISTEN_ADDR: ":8081"
      LLMPROXY_DATABASE_URL: "postgres://agentserver:agentserver@postgres:5432/llmproxy?sslmode=disable"
      LLMPROXY_AGENTSERVER_URL: "http://server:8080"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      ANTHROPIC_BASE_URL: "${ANTHROPIC_BASE_URL:-https://api.anthropic.com}"
    depends_on:
      - postgres
      - postgres-init-llmproxy
      - server

  credentialproxy:
    build:
      context: .
      dockerfile: Dockerfile.credentialproxy
    ports:
      - "8083:8083"
    environment:
      CREDPROXY_PORT: "8083"
      CREDPROXY_DATABASE_URL: "postgres://agentserver:agentserver@postgres:5432/agentserver?sslmode=disable"
      CREDPROXY_AGENTSERVER_URL: "http://server:8080"
      CREDPROXY_ENCRYPTION_KEY: "${CREDPROXY_ENCRYPTION_KEY}"
      CREDPROXY_LOG_LEVEL: "info"
    depends_on:
      - postgres
      - server

  executor-registry:
    build:
      context: .
      dockerfile: Dockerfile.executor-registry
    ports:
      - "8084:8084"
    environment:
      EXECREG_DATABASE_URL: "postgres://agentserver:agentserver@postgres:5432/agentserver?sslmode=disable"
      EXECREG_PORT: "8084"
      EXECREG_LOG_LEVEL: "info"
    depends_on:
      - postgres
    restart: unless-stopped

  cc-broker:
    build:
      context: .
      dockerfile: Dockerfile.cc-broker
    environment:
      CCBROKER_DATABASE_URL: "postgres://agentserver:agentserver@postgres:5432/agentserver?sslmode=disable"
      CCBROKER_PORT: "8085"
      CCBROKER_JWT_SECRET: "dev-secret-change-in-production-32chars"
      CCBROKER_LOG_LEVEL: "info"
    ports:
      - "8085:8085"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
