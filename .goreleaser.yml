version: 2

project_name: agentserver

builds:
  - id: agentserver-agent
    main: ./cmd/agentserver-agent
    binary: agentserver
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/agentserver/agentserver/internal/agent.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: agentserver-mcp-bridge
    main: ./cmd/agentserver-mcp-bridge
    binary: agentserver-mcp-bridge
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: agentserver-agent
    ids:
      - agentserver-agent
      - agentserver-mcp-bridge
    formats:
      - tar.gz
    name_template: "agentserver-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids:
        - agentserver-agent
      sign:
        certificate: "{{.Env.MACOS_SIGN_P12}}"
        password: "{{.Env.MACOS_SIGN_PASSWORD}}"
      notarize:
        issuer_id: "{{.Env.MACOS_NOTARY_ISSUER_ID}}"
        key_id: "{{.Env.MACOS_NOTARY_KEY_ID}}"
        key: "{{.Env.MACOS_NOTARY_KEY}}"
        wait: true
        timeout: 20m

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - name: agentserver
    ids:
      - agentserver-agent
    description: "Connect local opencode to agentserver via WebSocket tunnel"
    homepage: "https://github.com/agentserver/agentserver"
    repository:
      owner: agentserver
      name: homebrew-tap
      token: "{{.Env.HOMEBREW_TAP_TOKEN}}"

changelog:
  sort: asc

release:
  github:
    owner: agentserver
    name: agentserver
  header: |
    ## Agent Client

    Download the `agentserver` binary for your platform below to connect a local opencode instance:

    ```bash
    agentserver connect --server https://your-server --code <registration-code>
    ```

    ### Install via Homebrew

    ```bash
    brew install agentserver/tap/agentserver
    ```

    ## Docker Images

    ```
    ghcr.io/agentserver/agentserver:{{ .Tag }}
    ghcr.io/agentserver/opencode-agent:{{ .Tag }}
    ghcr.io/agentserver/llmproxy:{{ .Tag }}
    ```

    ## Helm Chart

    ```bash
    helm install agentserver oci://ghcr.io/agentserver/charts/agentserver --version {{ trimprefix .Tag "v" }}
    ```
