<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claude Code</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0/lib/addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0/lib/addon-web-links.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #1a1a2e; overflow: hidden; }
    #terminal { width: 100%; height: 100%; }
    #status {
      position: fixed; top: 8px; right: 12px; z-index: 10;
      font-family: monospace; font-size: 12px; color: #888;
      background: rgba(26,26,46,0.9); padding: 2px 8px; border-radius: 4px;
    }
    #status.connected { color: #4ade80; }
    #status.error { color: #f87171; }
  </style>
</head>
<body>
  <div id="status">Connecting...</div>
  <div id="terminal"></div>
  <script>
    const statusEl = document.getElementById('status');
    const term = new Terminal({
      cursorBlink: true,
      fontSize: 14,
      fontFamily: '"Cascadia Code", "Fira Code", "JetBrains Mono", monospace',
      theme: { background: '#1a1a2e', foreground: '#e0e0e0', cursor: '#c084fc' },
      allowProposedApi: true,
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.loadAddon(new WebLinksAddon.WebLinksAddon());
    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(proto + '//' + location.host + '/ws/terminal');
      ws.binaryType = 'arraybuffer';

      ws.onopen = function() {
        statusEl.textContent = 'Connected';
        statusEl.className = 'connected';
        // Send initial resize.
        const msg = JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows });
        ws.send(new Uint8Array([0x01, ...new TextEncoder().encode(msg)]));
      };

      ws.onmessage = function(e) {
        if (e.data instanceof ArrayBuffer) {
          const buf = new Uint8Array(e.data);
          if (buf.length > 0 && buf[0] === 0x00) {
            // Data frame: skip prefix byte.
            term.write(buf.subarray(1));
          }
        }
      };

      ws.onclose = function() {
        statusEl.textContent = 'Disconnected — reconnecting...';
        statusEl.className = 'error';
        term.write('\r\n\x1b[31m[Disconnected]\x1b[0m\r\n');
        setTimeout(connect, 3000);
      };

      ws.onerror = function() {
        ws.close();
      };

      term.onData(function(data) {
        if (ws.readyState !== WebSocket.OPEN) return;
        const encoded = new TextEncoder().encode(data);
        const frame = new Uint8Array(1 + encoded.length);
        frame[0] = 0x00; // Data frame prefix.
        frame.set(encoded, 1);
        ws.send(frame);
      });

      window.addEventListener('resize', function() {
        fitAddon.fit();
        if (ws.readyState === WebSocket.OPEN) {
          const msg = JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows });
          ws.send(new Uint8Array([0x01, ...new TextEncoder().encode(msg)]));
        }
      });
    }

    connect();
  </script>
</body>
</html>
