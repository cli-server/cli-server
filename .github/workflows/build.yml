name: Build and Publish

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write

jobs:
  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/agentserver/agentserver
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-opencode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2

      - name: Build opencode binary from submodule
        run: |
          cd opencode
          bun install --frozen-lockfile
          bun run --cwd packages/opencode build --single --skip-install
          cp packages/opencode/dist/opencode-linux-x64/bin/opencode ../opencode-bin
          chmod +x ../opencode-bin

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/agentserver/opencode-agent
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.opencode
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-llmproxy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/agentserver/llmproxy
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.llmproxy
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-helm:
    runs-on: ubuntu-latest
    needs: [build-server, build-opencode, build-llmproxy]
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Package and push Helm chart
        run: |
          helm package deploy/helm/agentserver
          helm push agentserver-*.tgz oci://${{ env.REGISTRY }}/agentserver/charts

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-server, build-opencode, build-llmproxy, publish-helm]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sign-macos:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    needs: [release]
    env:
      MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
      MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
      MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
      MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
      MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
      KEYCHAIN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
    steps:
      - name: Setup keychain and credentials
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEY_PATH=$RUNNER_TEMP/notary_key.p8
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db

          echo -n "$MACOS_SIGN_P12" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$MACOS_NOTARY_KEY" | base64 --decode -o "$KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$MACOS_SIGN_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          xcrun notarytool store-credentials "notary-profile" \
            --key "$KEY_PATH" \
            --key-id "$MACOS_NOTARY_KEY_ID" \
            --issuer "$MACOS_NOTARY_ISSUER_ID" \
            --keychain "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Sign, notarize and replace darwin assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}

          for ARCH in amd64 arm64; do
            ASSET="agentserver-darwin-${ARCH}.tar.gz"
            echo "::group::Processing $ASSET"

            gh release download "$TAG" -p "$ASSET" -R agentserver/agentserver
            mkdir -p "work-${ARCH}"
            tar -xzf "$ASSET" -C "work-${ARCH}"

            codesign --force --options runtime \
              --sign "$SIGNING_IDENTITY" \
              --keychain "$KEYCHAIN_PATH" \
              --timestamp \
              "work-${ARCH}/agentserver"

            codesign --verify --verbose "work-${ARCH}/agentserver"

            ditto -c -k "work-${ARCH}/agentserver" "work-${ARCH}/agentserver.zip"

            xcrun notarytool submit "work-${ARCH}/agentserver.zip" \
              --keychain-profile "notary-profile" \
              --keychain "$KEYCHAIN_PATH" \
              --wait

            tar -czf "$ASSET" -C "work-${ARCH}" agentserver
            gh release upload "$TAG" "$ASSET" --clobber -R agentserver/agentserver

            echo "::endgroup::"
          done

      - name: Update checksums and Homebrew Cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}

          SHA_AMD64=$(shasum -a 256 agentserver-darwin-amd64.tar.gz | awk '{print $1}')
          SHA_ARM64=$(shasum -a 256 agentserver-darwin-arm64.tar.gz | awk '{print $1}')

          gh release download "$TAG" -p "agentserver-linux-amd64.tar.gz" -R agentserver/agentserver -D /tmp
          gh release download "$TAG" -p "agentserver-linux-arm64.tar.gz" -R agentserver/agentserver -D /tmp
          SHA_LINUX_AMD64=$(shasum -a 256 /tmp/agentserver-linux-amd64.tar.gz | awk '{print $1}')
          SHA_LINUX_ARM64=$(shasum -a 256 /tmp/agentserver-linux-arm64.tar.gz | awk '{print $1}')

          cat > /tmp/agentserver.rb << CASK
          # This file was generated during release. DO NOT EDIT.
          cask "agentserver" do
            name "agentserver"
            desc "Connect local opencode to agentserver via WebSocket tunnel"
            homepage "https://github.com/agentserver/agentserver"
            version "${VERSION}"

            livecheck do
              skip "Auto-generated on release."
            end

            binary "agentserver"

            on_macos do
              on_intel do
                url "https://github.com/agentserver/agentserver/releases/download/v#{version}/agentserver-darwin-amd64.tar.gz"
                sha256 "${SHA_AMD64}"
              end
              on_arm do
                url "https://github.com/agentserver/agentserver/releases/download/v#{version}/agentserver-darwin-arm64.tar.gz"
                sha256 "${SHA_ARM64}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/agentserver/agentserver/releases/download/v#{version}/agentserver-linux-amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
              on_arm do
                url "https://github.com/agentserver/agentserver/releases/download/v#{version}/agentserver-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end
            end

            # No zap stanza required
          end
          CASK

          CONTENT=$(base64 -i /tmp/agentserver.rb)
          EXISTING_SHA=$(gh api repos/agentserver/homebrew-tap/contents/Casks/agentserver.rb --jq '.sha' 2>/dev/null || echo "")

          if [ -n "$EXISTING_SHA" ]; then
            gh api -X PUT repos/agentserver/homebrew-tap/contents/Casks/agentserver.rb \
              -f message="chore: update agentserver cask to ${VERSION} (signed+notarized)" \
              -f content="$CONTENT" \
              -f sha="$EXISTING_SHA"
          else
            gh api -X PUT repos/agentserver/homebrew-tap/contents/Casks/agentserver.rb \
              -f message="chore: add agentserver cask ${VERSION} (signed+notarized)" \
              -f content="$CONTENT"
          fi

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
