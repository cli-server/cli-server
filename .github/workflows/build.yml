name: Build and Publish

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write

jobs:
  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/agentserver/agentserver
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-opencode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2

      - name: Build opencode binary from submodule
        run: |
          cd opencode
          bun install --frozen-lockfile
          bun run --cwd packages/opencode build --single --skip-install
          cp packages/opencode/dist/opencode-linux-x64/bin/opencode ../opencode-bin
          chmod +x ../opencode-bin

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/agentserver/opencode-agent
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.opencode
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-llmproxy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/agentserver/llmproxy
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.llmproxy
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-sandboxproxy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/agentserver/sandboxproxy
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.sandboxproxy
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-helm:
    runs-on: ubuntu-latest
    needs: [build-server, build-opencode, build-llmproxy, build-sandboxproxy]
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Package and push Helm chart
        run: |
          helm package deploy/helm/agentserver
          helm push agentserver-*.tgz oci://${{ env.REGISTRY }}/agentserver/charts

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-server, build-opencode, build-llmproxy, build-sandboxproxy, publish-helm]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}

          # Download the source tarball and compute its SHA256
          curl -sL "https://github.com/agentserver/agentserver/archive/refs/tags/${TAG}.tar.gz" -o /tmp/source.tar.gz
          SHA=$(sha256sum /tmp/source.tar.gz | awk '{print $1}')

          cat > /tmp/agentserver.rb << 'FORMULA'
          # This file was generated during release. DO NOT EDIT.
          class Agentserver < Formula
            desc "Connect local opencode to agentserver via WebSocket tunnel"
            homepage "https://github.com/agentserver/agentserver"
            url "https://github.com/agentserver/agentserver/archive/refs/tags/v__VERSION__.tar.gz"
            sha256 "__SHA__"
            license "MIT"

            depends_on "go" => :build

            def install
              ldflags = "-s -w -X github.com/agentserver/agentserver/internal/agent.Version=#{version}"
              system "go", "build", *std_go_args(ldflags:), "./cmd/agentserver-agent"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/agentserver --version")
            end
          end
          FORMULA

          # Substitute version and SHA into the formula
          sed -i "s/__VERSION__/${VERSION}/g" /tmp/agentserver.rb
          sed -i "s/__SHA__/${SHA}/g" /tmp/agentserver.rb

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' /tmp/agentserver.rb

          CONTENT=$(base64 -w 0 /tmp/agentserver.rb)

          # Delete old Cask if it exists (best-effort, ignore errors)
          OLD_CASK_SHA=$(gh api repos/agentserver/homebrew-tap/contents/Casks/agentserver.rb --jq '.sha' 2>/dev/null || true)
          if [ -n "$OLD_CASK_SHA" ] && [ "$OLD_CASK_SHA" != "null" ]; then
            gh api -X DELETE repos/agentserver/homebrew-tap/contents/Casks/agentserver.rb \
              -f message="chore: remove old agentserver cask in favor of formula" \
              -f sha="$OLD_CASK_SHA" || true
          fi

          # Create or update the Formula
          EXISTING_SHA=$(gh api repos/agentserver/homebrew-tap/contents/Formula/agentserver.rb --jq '.sha' 2>/dev/null || true)

          if [ -n "$EXISTING_SHA" ] && [ "$EXISTING_SHA" != "null" ]; then
            gh api -X PUT repos/agentserver/homebrew-tap/contents/Formula/agentserver.rb \
              -f message="chore: update agentserver formula to ${VERSION}" \
              -f content="$CONTENT" \
              -f sha="$EXISTING_SHA"
          else
            gh api -X PUT repos/agentserver/homebrew-tap/contents/Formula/agentserver.rb \
              -f message="chore: add agentserver formula ${VERSION}" \
              -f content="$CONTENT"
          fi

  sign-macos:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    needs: [release]
    env:
      MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
      MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
      MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
      MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
      MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
      KEYCHAIN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
    steps:
      - name: Setup keychain and credentials
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEY_PATH=$RUNNER_TEMP/notary_key.p8
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db

          echo -n "$MACOS_SIGN_P12" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$MACOS_NOTARY_KEY" | base64 --decode -o "$KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$MACOS_SIGN_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          xcrun notarytool store-credentials "notary-profile" \
            --key "$KEY_PATH" \
            --key-id "$MACOS_NOTARY_KEY_ID" \
            --issuer "$MACOS_NOTARY_ISSUER_ID" \
            --keychain "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Sign, notarize and replace darwin assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}

          for ARCH in amd64 arm64; do
            ASSET="agentserver-darwin-${ARCH}.tar.gz"
            echo "::group::Processing $ASSET"

            gh release download "$TAG" -p "$ASSET" -R agentserver/agentserver
            mkdir -p "work-${ARCH}"
            tar -xzf "$ASSET" -C "work-${ARCH}"

            codesign --force --options runtime \
              --sign "$SIGNING_IDENTITY" \
              --keychain "$KEYCHAIN_PATH" \
              --timestamp \
              "work-${ARCH}/agentserver"

            codesign --verify --verbose "work-${ARCH}/agentserver"

            ditto -c -k "work-${ARCH}/agentserver" "work-${ARCH}/agentserver.zip"

            xcrun notarytool submit "work-${ARCH}/agentserver.zip" \
              --keychain-profile "notary-profile" \
              --keychain "$KEYCHAIN_PATH" \
              --output-format json > "/tmp/submit-${ARCH}.json"

            SUBMISSION_ID=$(python3 -c "import json; print(json.load(open('/tmp/submit-${ARCH}.json'))['id'])")
            echo "Submission ID: $SUBMISSION_ID"

            # Poll with retry on network errors
            for i in $(seq 1 120); do
              sleep 15
              if STATUS_JSON=$(xcrun notarytool info "$SUBMISSION_ID" \
                --keychain-profile "notary-profile" \
                --keychain "$KEYCHAIN_PATH" \
                --output-format json 2>&1); then
                STATUS=$(echo "$STATUS_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
                echo "Attempt $i: status=$STATUS"
                if [ "$STATUS" = "Accepted" ]; then
                  echo "Notarization accepted!"
                  break
                elif [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
                  echo "Notarization failed: $STATUS"
                  xcrun notarytool log "$SUBMISSION_ID" \
                    --keychain-profile "notary-profile" \
                    --keychain "$KEYCHAIN_PATH" 2>&1 || true
                  exit 1
                fi
              else
                echo "Attempt $i: network error, retrying..."
              fi
            done

            if [ "$STATUS" != "Accepted" ]; then
              echo "Notarization timed out (status=$STATUS)"
              exit 1
            fi

            tar -czf "$ASSET" -C "work-${ARCH}" agentserver
            gh release upload "$TAG" "$ASSET" --clobber -R agentserver/agentserver

            echo "::endgroup::"
          done

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
