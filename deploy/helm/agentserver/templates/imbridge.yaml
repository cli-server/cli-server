apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-imbridge
  labels:
    app: {{ .Release.Name }}-imbridge
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-imbridge
  template:
    metadata:
      annotations:
        agentserver.x-k8s.io/chart-version: {{ .Chart.AppVersion | quote }}
      labels:
        app: {{ .Release.Name }}-imbridge
    spec:
      terminationGracePeriodSeconds: 30
      {{- if .Values.postgresql.enabled }}
      initContainers:
        - name: wait-for-postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ .Release.Name }}-postgresql -p 5432 -U {{ .Values.postgresql.auth.username }}; do
                echo "Waiting for PostgreSQL to be ready..."
                sleep 2
              done
      {{- end }}
      serviceAccountName: {{ .Release.Name }}
      containers:
        - name: imbridge
          image: "{{ .Values.imbridge.image.repository }}:{{ .Values.imbridge.image.tag }}"
          imagePullPolicy: {{ .Values.imbridge.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.imbridge.port }}
              protocol: TCP
          env:
            - name: IMBRIDGE_LISTEN_ADDR
              value: ":{{ .Values.imbridge.port }}"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentserver.databaseSecretName" . }}
                  key: database-url
            - name: AGENTSERVER_URL
              value: "http://{{ .Release.Name }}:{{ .Values.service.port }}"
            {{- if .Values.internal.apiSecret }}
            - name: INTERNAL_API_SECRET
              value: {{ .Values.internal.apiSecret | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.imbridge.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.imbridge.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-imbridge
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.imbridge.port }}
      targetPort: {{ .Values.imbridge.port }}
      protocol: TCP
  selector:
    app: {{ .Release.Name }}-imbridge
