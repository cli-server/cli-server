{{- if .Values.ccbroker.enabled }}
{{- $_ := required "ccbroker.s3.existingSecret is required when ccbroker.enabled is true (k8s secret with keys: access_key_id, secret_access_key)" .Values.ccbroker.s3.existingSecret }}
{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (printf "%s-ccbroker-secret" .Release.Name)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-ccbroker-secret
  labels:
    app: {{ .Release.Name }}-ccbroker
type: Opaque
stringData:
  database-url: {{ include "agentserver.ccbrokerDatabaseUrl" . | quote }}
  {{- if .Values.ccbroker.jwtSecret }}
  jwt-secret: {{ .Values.ccbroker.jwtSecret | quote }}
  {{- else if $existingSecret }}
  jwt-secret: {{ index $existingSecret.data "jwt-secret" | b64dec | quote }}
  {{- else }}
  jwt-secret: {{ randAlphaNum 48 | quote }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ccbroker
  labels:
    app: {{ .Release.Name }}-ccbroker
spec:
  replicas: {{ .Values.ccbroker.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Release.Name }}-ccbroker
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-ccbroker
    spec:
      serviceAccountName: {{ .Release.Name }}
      initContainers:
        {{- if .Values.postgresql.enabled }}
        - name: wait-for-postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ .Release.Name }}-postgresql -p 5432 -U {{ .Values.postgresql.auth.username }}; do
                echo "Waiting for PostgreSQL to be ready..."
                sleep 2
              done
        - name: create-ccbroker-database
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          command:
            - sh
            - -c
            - |
              {{- $dbName := (dig "database" "name" "ccbroker" .Values.ccbroker) }}
              PGPASSWORD="$PG_PASSWORD" psql -h {{ .Release.Name }}-postgresql -U {{ .Values.postgresql.auth.username }} -d {{ .Values.postgresql.auth.database }} -tc "SELECT 1 FROM pg_database WHERE datname='{{ $dbName }}'" | grep -q 1 || \
              PGPASSWORD="$PG_PASSWORD" createdb -h {{ .Release.Name }}-postgresql -U {{ .Values.postgresql.auth.username }} {{ $dbName }}
          env:
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgresql
                  key: POSTGRES_PASSWORD
        {{- end }}
      containers:
        - name: cc-broker
          image: "{{ .Values.ccbroker.image.repository }}:{{ .Values.ccbroker.image.tag }}"
          imagePullPolicy: {{ .Values.ccbroker.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.ccbroker.port }}
              protocol: TCP
          env:
            - name: CCBROKER_PORT
              value: {{ .Values.ccbroker.port | quote }}
            - name: CCBROKER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-ccbroker-secret
                  key: database-url
            - name: CCBROKER_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-ccbroker-secret
                  key: jwt-secret
            - name: CCBROKER_EXECUTOR_REGISTRY_URL
              value: "http://{{ .Release.Name }}-executor-registry:{{ .Values.executorRegistry.port }}"
            - name: CCBROKER_AGENTSERVER_URL
              value: "http://{{ .Release.Name }}:{{ .Values.service.port }}"
            - name: CCBROKER_IMBRIDGE_URL
              value: "http://{{ .Release.Name }}-imbridge:{{ .Values.imbridge.port }}"
            - name: CCBROKER_S3_ENDPOINT
              value: {{ .Values.ccbroker.s3.endpoint | quote }}
            - name: CCBROKER_S3_REGION
              value: {{ .Values.ccbroker.s3.region | quote }}
            - name: CCBROKER_S3_BUCKET
              value: {{ .Values.ccbroker.s3.bucket | quote }}
            - name: CCBROKER_S3_PATH_STYLE
              value: {{ .Values.ccbroker.s3.pathStyle | quote }}
            - name: CCBROKER_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ccbroker.s3.existingSecret }}
                  key: access_key_id
            - name: CCBROKER_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ccbroker.s3.existingSecret }}
                  key: secret_access_key
            {{- if .Values.ccbroker.logLevel }}
            - name: CCBROKER_LOG_LEVEL
              value: {{ .Values.ccbroker.logLevel | quote }}
            {{- end }}
            {{- if .Values.internal.apiSecret }}
            - name: INTERNAL_API_SECRET
              value: {{ .Values.internal.apiSecret | quote }}
            {{- end }}
            # Anthropic credentials come from the shared agentserver secret so
            # there is a single source of truth (`models.anthropicApiKey`).
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: anthropic-api-key
                  optional: true
            - name: ANTHROPIC_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: anthropic-base-url
                  optional: true
            - name: ANTHROPIC_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: anthropic-auth-token
                  optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.ccbroker.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.ccbroker.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
          {{- with .Values.ccbroker.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ccbroker
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.ccbroker.port }}
      targetPort: {{ .Values.ccbroker.port }}
      protocol: TCP
  selector:
    app: {{ .Release.Name }}-ccbroker
{{- end }}
