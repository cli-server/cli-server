{{- if .Values.codexAppGateway.enabled }}
{{- $_ := required "codexAppGateway.s3.existingSecret is required when codexAppGateway.enabled is true (k8s secret with keys: access_key_id, secret_access_key)" .Values.codexAppGateway.s3.existingSecret }}
{{- $_ := required "codexAppGateway.s3.endpoint is required when codexAppGateway.enabled is true" .Values.codexAppGateway.s3.endpoint }}
{{- $_ := required "codexAppGateway.s3.bucket is required when codexAppGateway.enabled is true" .Values.codexAppGateway.s3.bucket }}
{{- $_ := required "codexAppGateway.codexApiKey is required when codexAppGateway.enabled is true (LLM provider API key forwarded to spawned codex)" .Values.codexAppGateway.codexApiKey }}
{{- $_ := required "internal.apiSecret is required when codexAppGateway.enabled is true" .Values.internal.apiSecret }}
{{- /*
Default model-provider base URL points at the in-cluster llmproxy unless
explicitly overridden. Pre-resolved here so the env block stays tidy.
*/}}
{{- $modelBaseUrl := .Values.codexAppGateway.modelProviderBaseUrl }}
{{- if not $modelBaseUrl }}{{- $modelBaseUrl = printf "http://%s-llmproxy.%s.svc:%v/v1" .Release.Name .Release.Namespace .Values.llmproxy.port }}{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-codex-app-gateway-secret
  labels:
    app: {{ .Release.Name }}-codex-app-gateway
type: Opaque
stringData:
  codex-api-key: {{ .Values.codexAppGateway.codexApiKey | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-codex-app-gateway
  labels:
    app: {{ .Release.Name }}-codex-app-gateway
spec:
  replicas: {{ .Values.codexAppGateway.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-codex-app-gateway
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-codex-app-gateway
    spec:
      serviceAccountName: {{ .Release.Name }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: codex-app-gateway
          image: "{{ .Values.codexAppGateway.image.repository }}:{{ .Values.codexAppGateway.image.tag }}"
          imagePullPolicy: {{ .Values.codexAppGateway.image.pullPolicy }}
          args: ["serve"]
          ports:
            - containerPort: {{ .Values.codexAppGateway.port }}
              name: http
              protocol: TCP
          env:
            - name: CXG_LISTEN_ADDR
              value: ":{{ .Values.codexAppGateway.port }}"
            - name: CXG_TMP_ROOT
              value: {{ .Values.codexAppGateway.tmpRoot | quote }}
            - name: CXG_IDLE_SHUTDOWN
              value: {{ .Values.codexAppGateway.idleShutdown | quote }}
            - name: CXG_CAPTOKEN_TTL
              value: {{ .Values.codexAppGateway.capTokenTtl | quote }}
            - name: CXG_INBOUND_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-codex-gateway
                  key: inbound-hmac-secret
            - name: CXG_CAPTOKEN_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-codex-gateway
                  key: cap-token-hmac-secret
            - name: CXG_EXEC_GATEWAY_INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-codex-gateway
                  key: internal-shared-secret
            - name: CXG_EXEC_GATEWAY_URL
              value: "ws://{{ .Release.Name }}-codex-exec-gateway.{{ .Release.Namespace }}.svc:{{ .Values.codexExecGateway.port }}"
            - name: CXG_EXEC_GATEWAY_INTERNAL_URL
              value: "http://{{ .Release.Name }}-codex-exec-gateway.{{ .Release.Namespace }}.svc:{{ .Values.codexExecGateway.port }}"
            - name: CXG_S3_ENDPOINT
              value: {{ .Values.codexAppGateway.s3.endpoint | quote }}
            - name: CXG_S3_REGION
              value: {{ .Values.codexAppGateway.s3.region | quote }}
            - name: CXG_S3_BUCKET
              value: {{ .Values.codexAppGateway.s3.bucket | quote }}
            - name: CXG_S3_PATH_STYLE
              value: {{ .Values.codexAppGateway.s3.pathStyle | quote }}
            - name: CXG_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.codexAppGateway.s3.existingSecret }}
                  key: access_key_id
            - name: CXG_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.codexAppGateway.s3.existingSecret }}
                  key: secret_access_key
            - name: CXG_MODEL
              value: {{ .Values.codexAppGateway.model | quote }}
            - name: CXG_MODEL_PROVIDER
              value: {{ .Values.codexAppGateway.modelProvider | quote }}
            - name: CXG_MODEL_PROVIDER_BASE_URL
              value: {{ $modelBaseUrl | quote }}
            - name: CXG_MODEL_PROVIDER_ENV_KEY
              value: {{ .Values.codexAppGateway.modelProviderEnvKey | quote }}
            - name: CXG_MODEL_PROVIDER_WIRE_API
              value: {{ .Values.codexAppGateway.modelProviderWireApi | quote }}
            - name: CXG_CODEX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-codex-app-gateway-secret
                  key: codex-api-key
            {{- if .Values.codexAppGateway.projectTrustedPaths }}
            - name: CXG_PROJECT_TRUSTED_PATHS
              value: {{ .Values.codexAppGateway.projectTrustedPaths | quote }}
            {{- end }}
            {{- if .Values.codexAppGateway.logLevel }}
            - name: CXG_LOG_LEVEL
              value: {{ .Values.codexAppGateway.logLevel | quote }}
            {{- end }}
            - name: CXG_AGENTSERVER_INTERNAL_URL
              value: "http://{{ .Release.Name }}.{{ .Release.Namespace }}.svc:{{ .Values.service.port }}"
            - name: CXG_AGENTSERVER_INTERNAL_SECRET
              value: {{ required "internal.apiSecret is required when codexAppGateway.enabled is true" .Values.internal.apiSecret | quote }}
            {{- if .Values.operations.enabled }}
            - name: CXG_OPLOG_URL
              value: "http://{{ .Release.Name }}.{{ .Release.Namespace }}.svc:{{ .Values.service.port }}/internal/operations"
            - name: CXG_OPLOG_SECRET
              value: {{ .Values.internal.apiSecret | quote }}
            - name: CXG_OPLOG_CHAN
              value: {{ .Values.operations.channelCapacity | quote }}
            {{- end }}
          # CODEX_HOME tmpdirs (sqlite + session jsonl) live here. emptyDir
          # is sufficient because state is round-tripped to S3 on idle
          # shutdown — pod restart loses no data.
          volumeMounts:
            - name: codex-home-tmp
              mountPath: {{ .Values.codexAppGateway.tmpRoot }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.codexAppGateway.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.codexAppGateway.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
          {{- with .Values.codexAppGateway.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: codex-home-tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-codex-app-gateway
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.codexAppGateway.port }}
      targetPort: {{ .Values.codexAppGateway.port }}
      protocol: TCP
      name: http
  selector:
    app: {{ .Release.Name }}-codex-app-gateway
{{- end }}
