{{- if .Values.credentialproxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-credentialproxy
  labels:
    app: {{ .Release.Name }}-credentialproxy
spec:
  replicas: {{ .Values.credentialproxy.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-credentialproxy
  template:
    metadata:
      annotations:
        agentserver.x-k8s.io/chart-version: {{ .Chart.AppVersion | quote }}
      labels:
        app: {{ .Release.Name }}-credentialproxy
    spec:
      {{- if .Values.postgresql.enabled }}
      initContainers:
        - name: wait-for-postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ .Release.Name }}-postgresql -p 5432 -U {{ .Values.postgresql.auth.username }}; do
                echo "Waiting for PostgreSQL to be ready..."
                sleep 2
              done
      {{- end }}
      containers:
        - name: credentialproxy
          image: "{{ .Values.credentialproxy.image.repository }}:{{ .Values.credentialproxy.image.tag }}"
          imagePullPolicy: {{ .Values.credentialproxy.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.credentialproxy.port }}
              protocol: TCP
          env:
            - name: CREDPROXY_PORT
              value: {{ .Values.credentialproxy.port | quote }}
            - name: CREDPROXY_DATABASE_URL
              {{- if .Values.credentialproxy.externalDatabaseUrl }}
              value: {{ .Values.credentialproxy.externalDatabaseUrl | quote }}
              {{- else }}
              value: {{ include "agentserver.databaseUrl" . | quote }}
              {{- end }}
            - name: CREDPROXY_AGENTSERVER_URL
              value: "http://{{ .Release.Name }}:{{ .Values.service.port }}"
            - name: CREDPROXY_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: credproxy-encryption-key
            - name: CREDPROXY_LOG_LEVEL
              value: {{ .Values.credentialproxy.logLevel | default "info" | quote }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.credentialproxy.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.credentialproxy.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-credentialproxy
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.credentialproxy.port }}
      targetPort: {{ .Values.credentialproxy.port }}
      protocol: TCP
  selector:
    app: {{ .Release.Name }}-credentialproxy
{{- end }}
