{{- if .Values.ingress.enabled }}
{{- /*
Resolve the codex gateway hostnames once. Default to subdomains of the
main ingress host so a single wildcard cert (or a SAN cert from
cert-manager) can cover everything.
*/}}
{{- $codexAppHost := .Values.codexAppGateway.externalHost }}
{{- if and .Values.codexAppGateway.enabled (not $codexAppHost) }}{{- $codexAppHost = printf "codex-app.%s" .Values.ingress.host }}{{- end }}
{{- $codexExecHost := .Values.codexExecGateway.externalHost }}
{{- if and .Values.codexExecGateway.enabled (not $codexExecHost) }}{{- $codexExecHost = printf "codex-exec.%s" .Values.ingress.host }}{{- end }}
{{- $codexAuthHost := .Values.codexAuth.externalHost }}
{{- if and .Values.codexAuth.enabled (not $codexAuthHost) }}{{- $codexAuthHost = printf "codex-auth.%s" .Values.ingress.host }}{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  annotations:
    {{- if .Values.ingress.tls }}
    cert-manager.io/cluster-issuer: letsencrypt-prod
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
        {{- if .Values.sandbox.baseDomain }}
        - {{ printf "*.%s" .Values.sandbox.baseDomain | quote }}
        {{- end }}
        {{- range .Values.sandbox.additionalBaseDomains }}
        - {{ printf "*.%s" . | quote }}
        {{- end }}
        {{- if .Values.codexAppGateway.enabled }}
        - {{ $codexAppHost | quote }}
        {{- end }}
        {{- if .Values.codexExecGateway.enabled }}
        - {{ $codexExecHost | quote }}
        {{- end }}
        {{- if .Values.codexAuth.enabled }}
        - {{ $codexAuthHost | quote }}
        {{- end }}
      secretName: {{ .Release.Name }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}
                port:
                  number: {{ .Values.service.port }}
    {{- if .Values.sandbox.baseDomain }}
    - host: {{ printf "*.%s" .Values.sandbox.baseDomain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-sandboxproxy
                port:
                  number: {{ .Values.sandboxProxy.port }}
    {{- end }}
    {{- range .Values.sandbox.additionalBaseDomains }}
    - host: {{ printf "*.%s" . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $.Release.Name }}-sandboxproxy
                port:
                  number: {{ $.Values.sandboxProxy.port }}
    {{- end }}
    {{- if .Values.codexAppGateway.enabled }}
    - host: {{ $codexAppHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-codex-app-gateway
                port:
                  number: {{ .Values.codexAppGateway.port }}
    {{- end }}
    {{- if .Values.codexExecGateway.enabled }}
    - host: {{ $codexExecHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-codex-exec-gateway
                port:
                  number: {{ .Values.codexExecGateway.port }}
    {{- end }}
{{- if .Values.codexAuth.enabled }}
---
# codex-auth subdomain has its own Ingress so the rewrite-target
# annotation only applies here (the main {{ .Release.Name }} Ingress
# doesn't rewrite, so we can't share its annotations). cert-manager
# annotation + secretName are inherited from the existing wildcard /
# SAN cert; this Ingress doesn't need its own TLS block when the main
# one already covers $codexAuthHost in its hosts list.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-codex-auth
  annotations:
    {{- if .Values.ingress.tls }}
    cert-manager.io/cluster-issuer: letsencrypt-prod
    {{- end }}
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /codex-auth/$1
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ $codexAuthHost | quote }}
      secretName: {{ .Release.Name }}-tls
  {{- end }}
  rules:
    - host: {{ $codexAuthHost }}
      http:
        paths:
          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Release.Name }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
{{- end }}
