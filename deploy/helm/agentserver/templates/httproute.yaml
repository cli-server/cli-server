{{- if .Values.gateway.enabled }}
{{- /*
Resolve the codex gateway hostnames once. Default to subdomains of the
main gateway host. Operator can override via {codexAppGateway,codexExecGateway}.externalHost.
*/}}
{{- $codexAppHost := .Values.codexAppGateway.externalHost }}
{{- if and .Values.codexAppGateway.enabled (not $codexAppHost) }}{{- $codexAppHost = printf "codex-app.%s" .Values.gateway.host }}{{- end }}
{{- $codexExecHost := .Values.codexExecGateway.externalHost }}
{{- if and .Values.codexExecGateway.enabled (not $codexExecHost) }}{{- $codexExecHost = printf "codex-exec.%s" .Values.gateway.host }}{{- end }}
{{- $codexAuthHost := .Values.codexAuth.externalHost }}
{{- if and .Values.codexAuth.enabled (not $codexAuthHost) }}{{- $codexAuthHost = printf "codex-auth.%s" .Values.gateway.host }}{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
spec:
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  hostnames:
    - {{ .Values.gateway.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Release.Name }}
          port: {{ .Values.service.port }}
{{- if .Values.sandbox.baseDomain }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-sandboxproxy
spec:
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  hostnames:
    - {{ printf "*.%s" .Values.sandbox.baseDomain | quote }}
    {{- range .Values.sandbox.additionalBaseDomains }}
    - {{ printf "*.%s" . | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Release.Name }}-sandboxproxy
          port: {{ .Values.sandboxProxy.port }}
{{- end }}
{{- if .Values.codexAppGateway.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-codex-app-gateway
spec:
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  hostnames:
    - {{ $codexAppHost | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Release.Name }}-codex-app-gateway
          port: {{ .Values.codexAppGateway.port }}
{{- end }}
{{- if .Values.codexAuth.enabled }}
---
# codex-auth subdomain. Rewrites the request path to /codex-auth/* before
# forwarding to the agentserver service, where the codexauth subrouter
# is mounted. Keeping the auth surface on a separate subdomain isolates
# its cookie jar from the main app and gives codex a clean issuer URL
# without a trailing /codex-auth path component.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-codex-auth
spec:
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  hostnames:
    - {{ $codexAuthHost | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /codex-auth
      backendRefs:
        - name: {{ .Release.Name }}
          port: {{ .Values.service.port }}
{{- end }}
{{- if .Values.codexExecGateway.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-codex-exec-gateway
spec:
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  hostnames:
    - {{ $codexExecHost | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Release.Name }}-codex-exec-gateway
          port: {{ .Values.codexExecGateway.port }}
{{- end }}
{{- end }}
