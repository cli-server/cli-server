{{- if .Values.gateway.enabled }}
{{- /*
Resolve the codex gateway hostnames once. Default to subdomains of the
main gateway host. Operator can override via {codexAppGateway,codexExecGateway}.externalHost.
*/}}
{{- $codexAppHost := .Values.codexAppGateway.externalHost }}
{{- if and .Values.codexAppGateway.enabled (not $codexAppHost) }}{{- $codexAppHost = printf "codex-app.%s" .Values.gateway.host }}{{- end }}
{{- $codexExecHost := .Values.codexExecGateway.externalHost }}
{{- if and .Values.codexExecGateway.enabled (not $codexExecHost) }}{{- $codexExecHost = printf "codex-exec.%s" .Values.gateway.host }}{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
spec:
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  hostnames:
    - {{ .Values.gateway.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Release.Name }}
          port: {{ .Values.service.port }}
{{- if .Values.notebook.host.baseDomain }}
{{- $nbPrefix := .Values.notebook.host.subdomainPrefix }}
{{- $nbBase := .Values.notebook.host.baseDomain }}
---
# Per-workspace notebook vhost. Hostname pattern:
#   {prefix}-{ws_short}.{baseDomain}
# Same wildcard hostname as the sandboxproxy route, but disambiguated
# by a Host-header regex matcher. Per Gateway API precedence rules
# (more matchers = more specific) this wins over sandboxproxy for any
# host matching the regex; sandboxproxy still grabs every other
# subdomain.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-notebook-vhost
spec:
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  hostnames:
    - {{ printf "*.%s" $nbBase | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
          headers:
            - name: Host
              type: RegularExpression
              value: {{ printf "^%s-[0-9a-fA-F]+\\.%s(:[0-9]+)?$" $nbPrefix ($nbBase | replace "." "\\.") | quote }}
      backendRefs:
        - name: {{ .Release.Name }}
          port: {{ .Values.service.port }}
{{- end }}
{{- if .Values.sandbox.baseDomain }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-sandboxproxy
spec:
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  hostnames:
    - {{ printf "*.%s" .Values.sandbox.baseDomain | quote }}
    {{- range .Values.sandbox.additionalBaseDomains }}
    - {{ printf "*.%s" . | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Release.Name }}-sandboxproxy
          port: {{ .Values.sandboxProxy.port }}
{{- end }}
{{- if .Values.codexAppGateway.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-codex-app-gateway
spec:
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  hostnames:
    - {{ $codexAppHost | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Release.Name }}-codex-app-gateway
          port: {{ .Values.codexAppGateway.port }}
{{- end }}
{{- if .Values.codexExecGateway.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-codex-exec-gateway
spec:
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  hostnames:
    - {{ $codexExecHost | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Release.Name }}-codex-exec-gateway
          port: {{ .Values.codexExecGateway.port }}
{{- end }}
{{- end }}
