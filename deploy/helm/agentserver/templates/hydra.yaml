{{- if .Values.hydra.enabled }}
# --- Hydra Secret (DSN + system secret) ---
{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (printf "%s-hydra-secret" .Release.Name)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-hydra-secret
  labels:
    app.kubernetes.io/component: hydra
type: Opaque
stringData:
  dsn: {{ include "agentserver.hydraDsn" . | quote }}
  pg-password: {{ .Values.postgresql.auth.password | quote }}
  {{- if .Values.hydra.secretsSystem }}
  secrets-system: {{ .Values.hydra.secretsSystem | quote }}
  {{- else if and $existingSecret (index $existingSecret "data") (index $existingSecret.data "secrets-system") }}
  secrets-system: {{ index $existingSecret.data "secrets-system" | b64dec | quote }}
  {{- else }}
  secrets-system: {{ randAlphaNum 32 | quote }}
  {{- end }}
---
# --- Hydra Deployment ---
# initContainers handle DB creation and schema migration before Hydra starts.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-hydra
  labels:
    app.kubernetes.io/component: hydra
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: hydra
  template:
    metadata:
      labels:
        app.kubernetes.io/component: hydra
    spec:
      initContainers:
        # 1. Create the "hydra" database in shared PostgreSQL
        - name: create-db
          image: {{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}
          command: ["sh", "-c"]
          args:
            - |
              until pg_isready -h {{ .Release.Name }}-postgresql -U {{ .Values.postgresql.auth.username }}; do sleep 2; done
              PGPASSWORD="$PG_PASSWORD" psql -h {{ .Release.Name }}-postgresql -U {{ .Values.postgresql.auth.username }} -d {{ .Values.postgresql.auth.database }} -tc "SELECT 1 FROM pg_database WHERE datname='{{ .Values.hydra.database.name }}'" | grep -q 1 || \
              PGPASSWORD="$PG_PASSWORD" createdb -h {{ .Release.Name }}-postgresql -U {{ .Values.postgresql.auth.username }} {{ .Values.hydra.database.name }}
          env:
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-hydra-secret
                  key: pg-password
        # 2. Run Hydra SQL migrations
        - name: migrate
          image: {{ .Values.hydra.image.repository }}:{{ .Values.hydra.image.tag }}
          imagePullPolicy: {{ .Values.hydra.image.pullPolicy }}
          command: ["hydra", "migrate", "sql", "-e", "--yes"]
          env:
            - name: DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-hydra-secret
                  key: dsn
      containers:
        - name: hydra
          image: {{ .Values.hydra.image.repository }}:{{ .Values.hydra.image.tag }}
          imagePullPolicy: {{ .Values.hydra.image.pullPolicy }}
          command: ["hydra", "serve", "all"]
          env:
            - name: DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-hydra-secret
                  key: dsn
            - name: URLS_SELF_ISSUER
              value: {{ printf "https://%s" .Values.platform.domain | quote }}
            - name: URLS_LOGIN
              value: {{ printf "https://%s/api/oauth2/login" .Values.platform.domain | quote }}
            - name: URLS_CONSENT
              value: {{ printf "https://%s/api/oauth2/consent" .Values.platform.domain | quote }}
            - name: SECRETS_SYSTEM
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-hydra-secret
                  key: secrets-system
            - name: SERVE_PUBLIC_PORT
              value: {{ .Values.hydra.publicPort | quote }}
            - name: SERVE_ADMIN_PORT
              value: {{ .Values.hydra.adminPort | quote }}
            - name: OAUTH2_DEVICE_AUTHORIZATION_TOKEN_POLLING_INTERVAL
              value: {{ .Values.hydra.deviceAuthTokenPollingInterval | quote }}
            - name: LOG_LEVEL
              value: "info"
          ports:
            - name: public
              containerPort: {{ .Values.hydra.publicPort }}
            - name: admin
              containerPort: {{ .Values.hydra.adminPort }}
          livenessProbe:
            httpGet:
              path: /health/alive
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: admin
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
---
# --- Hydra OAuth2 client registration Job ---
# Runs as a regular Job (not a Helm hook) so Pulumi/ArgoCD can manage it.
# Waits for Hydra to be ready, then idempotently registers the CLI client.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-hydra-client-setup-{{ .Chart.Version | replace "." "-" }}
  labels:
    app.kubernetes.io/component: hydra-client-setup
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/component: hydra-client-setup
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-hydra
          image: {{ .Values.hydra.image.repository }}:{{ .Values.hydra.image.tag }}
          imagePullPolicy: {{ .Values.hydra.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              until wget -qO- http://{{ .Release.Name }}-hydra-admin:{{ .Values.hydra.adminPort }}/health/ready 2>/dev/null | grep -q ok; do
                echo "Waiting for Hydra to be ready..."
                sleep 3
              done
      containers:
        - name: register-client
          image: {{ .Values.hydra.image.repository }}:{{ .Values.hydra.image.tag }}
          imagePullPolicy: {{ .Values.hydra.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              ENDPOINT="http://{{ .Release.Name }}-hydra-admin:{{ .Values.hydra.adminPort }}"
              CLIENT_ARGS="--id agentserver-agent-cli \
                --name Agentserver_Agent_CLI \
                --grant-type urn:ietf:params:oauth:grant-type:device_code \
                --grant-type refresh_token \
                --response-type code \
                --scope openid --scope profile --scope agent:register \
                --token-endpoint-auth-method none \
                --audience https://{{ .Values.platform.domain }}"
              hydra update oauth2-client agentserver-agent-cli --endpoint "$ENDPOINT" $CLIENT_ARGS 2>/dev/null || \
              hydra create oauth2-client --endpoint "$ENDPOINT" $CLIENT_ARGS
---
# --- Hydra Public Service ---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-hydra-public
  labels:
    app.kubernetes.io/component: hydra
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: hydra
  ports:
    - port: {{ .Values.hydra.publicPort }}
      targetPort: public
      name: public
---
# --- Hydra Admin Service ---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-hydra-admin
  labels:
    app.kubernetes.io/component: hydra
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: hydra
  ports:
    - port: {{ .Values.hydra.adminPort }}
      targetPort: admin
      name: admin
{{- end }}
