replicaCount: 1

image:
  repository: ghcr.io/agentserver/agentserver
  tag: latest
  pullPolicy: Always

postgresql:
  enabled: true
  image:
    repository: registry.nj.cs.ac.cn/dockerhub/postgres
    tag: "18-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: agentserver
    password: agentserver
    database: agentserver
  primary:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: "csi-rbd-sc"
    resources: {}

externalDatabase:
  host: ""
  port: 5432
  user: ""
  password: ""
  database: ""
  sslmode: disable
  # Raw connection URL (overrides individual fields above)
  url: ""
  # Existing K8s secret with a "database-url" key (overrides everything above)
  existingSecret: ""

models:
  anthropicApiKey: ""
  anthropicBaseUrl: ""
  anthropicAuthToken: ""
  geminiApiKey: ""

platform:
  # Domain for the platform web UI (e.g. "platform.agentserver.dev").
  # Used for OIDC redirect URLs (auto-derived as https://<domain>).
  domain: ""
  defaultQuotas:
    userMaxWorkspaces: 10
    workspaceMaxSandboxes: 20
    maxSandboxCpu: 2000            # millicores (2000 = 2 cores)
    maxSandboxMemory: 2147483648   # bytes (2Gi)
    maxWorkspaceDriveSize: 10737418240  # bytes (10Gi)
    workspaceMaxTotalCpu: 0        # millicores, 0 = unlimited
    workspaceMaxTotalMemory: 0     # bytes, 0 = unlimited
    workspaceMaxIdleTimeout: 0     # seconds, 0 = unlimited
  auth:
    password:
      enabled: true
    oidc:
      github:
        enabled: false
        clientId: ""
        clientSecret: ""
        # Override OAuth callback base URL (defaults to https://<platform.domain>).
        redirectBaseUrl: ""
        # Comma-separated base domains where GitHub login is shown (empty = all domains).
        allowedDomains: ""
      generic:
        enabled: false
        issuerUrl: ""
        clientId: ""
        clientSecret: ""
        # Comma-separated base domains where SSO login is shown (empty = all domains).
        allowedDomains: ""

sandbox:
  # Base domain for subdomain-based sandbox routing (e.g. "agentserver.dev").
  # Each sandbox gets a subdomain: {prefix}-{sessionID}.{baseDomain}
  baseDomain: ""
  # Additional base domains for multi-domain support (e.g. ["agent.cs.ac.cn"]).
  # Sandbox subdomains will be accessible on all configured domains.
  additionalBaseDomains: []
  # Prefix for per-workspace K8s namespaces (e.g. "agent-ws" → "agent-ws-a1b2c3d4").
  namespacePrefix: "agent-ws"
  # StorageClass for sandbox session volumes (empty = cluster default).
  sessionStorageClassName: ""
  # StorageClass for workspace drive PVCs (empty = falls back to sessionStorageClassName).
  workspaceStorageClassName: ""
  # Size of the session PVC for each sandbox pod.
  sessionStorageSize: "5Gi"
  opencode:
    image: ghcr.io/agentserver/opencode-agent:latest
    runtimeClassName: ""  # e.g. "gvisor" for gVisor isolation
    subdomainPrefix: "code"  # subdomain: {prefix}-{sessionID}.{baseDomain}
    # Opencode config injected into sandbox pods via OPENCODE_CONFIG_CONTENT.
    # Accepts any valid opencode.json fields as structured YAML.
    # The LLM proxy baseURL (provider.anthropic.options.baseURL) is auto-injected
    # from the llmproxy service URL at deploy time.
    config: {}
  openclaw:
    image: ""
    runtimeClassName: ""
    subdomainPrefix: "claw"  # subdomain: {prefix}-{sessionID}.{baseDomain}
    weixinEnabled: false     # Install and enable the official WeChat channel plugin
  claudecode:
    image: ""                # e.g. ghcr.io/agentserver/claudecode-agent:main
    runtimeClassName: ""
    subdomainPrefix: "claude" # subdomain: {prefix}-{sessionID}.{baseDomain}
  jupyter:
    image: ""                # e.g. ghcr.io/agentserver/agentserver-jupyter:main
    runtimeClassName: ""
    subdomainPrefix: "jupyter" # subdomain: {prefix}-{sandboxID}.{baseDomain}
  nanoclaw:
    image: ""                # e.g. ghcr.io/agentserver/nanoclaw-agent:v1.2.42
    runtimeClassName: ""
    weixinEnabled: false     # Enable WeChat channel via agentserver bridge
    bridgeBaseUrl: ""        # agentserver internal URL for NanoClaw pod callbacks (e.g. "http://agentserver.agentserver.svc:8080")
    model: ""                # Claude Code model override (e.g. "claude-opus-4-6")
  networkPolicy:
    enabled: false
    # CIDR ranges to deny egress to (internal/private networks).
    denyCIDRs: []

agentSandbox:
  # Set to false to skip installing the agent-sandbox controller (if already installed cluster-wide)
  install: true
  controllerImage: registry.k8s.io/agent-sandbox/agent-sandbox-controller:v0.1.1

codexAuth:
  # Self-hosted codex 0.132+ auth shim. When enabled, agentserver
  # serves PKCE / device flow / JWKS / agent-identity endpoints on a
  # dedicated subdomain (default codex-auth.<gateway.host or ingress.host>),
  # routed through Gateway URLRewrite / Ingress rewrite-target back to
  # the agentserver service's /codex-auth/* internal mount.
  #
  # User-facing issuer URL is the subdomain (no path), so:
  #   codex login --issuer https://codex-auth.<your-domain>
  enabled: false
  # Override the auto-derived subdomain when you need a different host
  # (e.g. for a custom DNS scheme). Leave empty to use codex-auth.<gateway.host>.
  externalHost: ""

hydra:
  # Ory Hydra OAuth2 server for agent Device Flow registration.
  # When enabled, deploys Hydra alongside agentserver and configures
  # the agentserver as Hydra's login/consent provider.
  enabled: false
  image:
    repository: oryd/hydra
    tag: "v26.2.0"
    pullPolicy: IfNotPresent
  publicPort: 4444
  adminPort: 4445
  database:
    # Database name created on the shared PostgreSQL instance.
    name: hydra
    # Set to use an external database instead of the shared PostgreSQL.
    externalDsn: ""
  # System secret for cookie/token encryption (32+ chars, auto-generated if empty).
  secretsSystem: ""
  # Device Flow polling interval.
  deviceAuthTokenPollingInterval: "5s"

modelserver:
  # Connect workspaces to a ModelServer project via OAuth 2.0 (Hydra).
  # When enabled, sandbox LLM traffic routes through llmproxy → ModelServer.
  enabled: false
  oauth:
    clientId: ""
    clientSecret: ""
    authUrl: ""        # Hydra public authorization endpoint (e.g. https://codeapi.cs.ac.cn/oauth2/auth)
    tokenUrl: ""       # Hydra public token endpoint (e.g. https://codeapi.cs.ac.cn/oauth2/token)
    introspectUrl: ""  # Hydra admin introspection endpoint (e.g. http://hydra:4445/admin/oauth2/introspect)
    redirectUri: ""    # OAuth callback URL (auto-derived as https://<platform.domain>/api/auth/modelserver/callback if blank)
  proxyUrl: ""         # ModelServer LLM proxy URL (e.g. https://code.ai.cs.ac.cn)

llmproxy:
  # LLM proxy for token usage tracking and request tracing.
  # The proxy baseURL is auto-injected into sandbox OPENCODE_CONFIG_CONTENT.
  image:
    repository: ghcr.io/agentserver/llmproxy
    tag: latest
    pullPolicy: Always
  # Number of llmproxy replicas (defaults to global replicaCount if not set).
  replicaCount: 1
  # LLM proxy listens on this port inside the container.
  port: 8081
  # LLM proxy uses the same PostgreSQL instance by default (separate database "llmproxy").
  # Set externalDatabaseUrl to use a different database.
  database:
    # Database name created on the shared PostgreSQL instance.
    name: llmproxy
  externalDatabaseUrl: ""
  # Default max requests per day per workspace (0 = unlimited).
  defaultMaxRpd: 0

imbridge:
  image:
    repository: ghcr.io/agentserver/imbridge
    tag: latest
    pullPolicy: Always
  port: 8083

sandboxProxy:
  image:
    repository: ghcr.io/agentserver/sandboxproxy
    tag: latest
    pullPolicy: Always
  replicaCount: 1
  port: 8082

credentialproxy:
  # Credential proxy for secure external API access from sandboxes.
  # When enabled, sandboxes can use user-uploaded kubeconfigs to access
  # external k8s clusters without seeing the real credentials.
  enabled: false
  image:
    repository: ghcr.io/agentserver/credentialproxy
    tag: latest
    pullPolicy: Always
  replicaCount: 1
  port: 8083
  logLevel: info
  # 32-byte AES-256 key (base64 or hex encoded). Required when enabled.
  # Both agentserver and credentialproxy must share the same key.
  encryptionKey: ""
  # Override database URL (defaults to shared agentserver database).
  externalDatabaseUrl: ""

# Shared secret used on all internal service-to-service calls:
#   agentserver → imbridge, imbridge → agentserver, cc-broker → imbridge.
# When empty, internal endpoints fall open (no auth); set this in production.
internal:
  apiSecret: ""

# Operation log (Plan 2): codex-app-gateway records every MCP tool call to
# agentserver's /internal/operations endpoint for audit + replay.
operations:
  # When true, codex-app-gateway POSTs every mcpServer/tool/call to
  # agentserver's /internal/operations. Disable to revert to pre-Plan-2
  # behavior (no logging).
  enabled: true
  # Retention in days. 0 disables the cleanup loop.
  retentionDays: 90
  # Bounded channel capacity inside the gateway. Drops on overflow.
  channelCapacity: 1024

# codexGateway: shared secrets for the codex-app-gateway / codex-exec-gateway
# pair. Both pods read from the same auto-generated k8s Secret so the cap
# tokens app-gw mints are verifiable by exec-gw, and the internal API
# Bearer is in agreement on both sides.
#
# Override any of these to pin values across reinstalls; leave empty for
# auto-generated 48-char alphanum (preserved on upgrade via lookup).
codexGateway:
  inboundHmacSecret: ""
  capTokenHmacSecret: ""
  internalSharedSecret: ""

# codex-app-gateway: per-thread codex app-server subprocess manager + ws
# frame proxy. Spawns codex app-server children, fetches workspace executor
# bindings from codex-exec-gateway, mints per-turn cap tokens, and writes
# config.toml entries that route remote tool calls through the env-mcp
# child binary.
codexAppGateway:
  enabled: false
  image:
    repository: ghcr.io/agentserver/codex-app-gateway
    tag: latest
    pullPolicy: Always
  replicaCount: 1
  port: 8086
  logLevel: info
  # Idle-shutdown timer: spawned codex app-server child gets reaped this
  # long after the last proxied frame. Cap-token TTL should be at least
  # this long so a long-idle session can resume without re-mint.
  idleShutdown: 30m
  capTokenTtl: 1h
  # Model + provider info written verbatim into each per-thread
  # config.toml's [model_providers.X] block. Defaults assume llmproxy
  # in-cluster.
  model: gpt-5.5
  modelProvider: modelserver
  modelProviderBaseUrl: ""        # default: http://{release}-llmproxy:{port}/v1
  modelProviderEnvKey: CODEX_API_KEY
  modelProviderWireApi: responses
  # API key the spawned codex uses to authenticate to the model provider.
  # Required for the subprocess to make any LLM call.
  codexApiKey: ""
  # Comma-separated paths marked trust_level="trusted" in config.toml.
  # Empty defaults to "/tmp" inside the gateway code.
  projectTrustedPaths: ""
  # Where per-thread CODEX_HOME tmpdirs live. Should be on a fast local
  # volume; emptyDir is fine since state is round-tripped to S3.
  tmpRoot: /tmp/codex-app-gateway
  # External hostname for the codex TUI to reach this gateway.
  # Empty defaults to "codex-app.<ingress.host>" (or .<gateway.host>).
  # Only used when ingress.enabled or gateway.enabled is true.
  externalHost: ""
  # S3-compatible store for per-thread CODEX_HOME tarballs (sqlite +
  # session jsonl). Required.
  s3:
    endpoint: ""
    region: ""
    bucket: ""
    pathStyle: false
    existingSecret: ""            # k8s secret with keys: access_key_id, secret_access_key
  resources: {}

# codex-exec-gateway: pairs inbound /codex-exec/{exe_id} executor connections
# with /bridge/{exe_id} env-mcp child connections, owns executors +
# workspace_executors Postgres tables, exposes register/binding HTTP API.
codexExecGateway:
  enabled: false
  image:
    repository: ghcr.io/agentserver/codex-exec-gateway
    tag: latest
    pullPolicy: Always
  replicaCount: 1
  port: 6060
  logLevel: info
  pingInterval: 30s
  idleTimeout: 5m
  database:
    name: codexexecgateway
    externalUrl: ""
  # External hostname for remote `codex exec-server --connect` workers
  # and operators calling /api/codex-exec/*. Empty defaults to
  # "codex-exec.<ingress.host>" (or .<gateway.host>). Only used when
  # ingress.enabled or gateway.enabled is true.
  externalHost: ""
  # External hostname for `codex exec-server --connect ...` URLs shown
  # in the workspace UI (e.g. "codex-exec.agent.cs.ac.cn"). Empty omits
  # the convenience copy-command in the registration response — UI then
  # tells the user to ask their operator for the URL.
  publicHost: ""
  # v0.56.0 HTTP relay copy_path tunables. Both optional; defaults
  # baked into the binary (5m / 16) apply when empty.
  relayDefaultTTL: ""      # e.g. "5m" — per-ticket pairing timeout
  relayMaxPerWorkspace: 0  # e.g. 16 — concurrent relays per workspace
  resources: {}

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: nginx
  host: agentserver.example.com
  tls: false

gateway:
  enabled: false
  parentRefs:
    - name: cilium-gateway
      namespace: cilium-gateway
  host: agentserver.example.com

