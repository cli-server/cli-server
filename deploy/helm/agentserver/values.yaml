replicaCount: 1

image:
  repository: ghcr.io/agentserver/agentserver
  tag: latest
  pullPolicy: Always

postgresql:
  enabled: true
  image:
    repository: registry.nj.cs.ac.cn/dockerhub/postgres
    tag: "18-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: agentserver
    password: agentserver
    database: agentserver
  primary:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: "csi-rbd-sc"
    resources: {}

externalDatabase:
  host: ""
  port: 5432
  user: ""
  password: ""
  database: ""
  sslmode: disable
  # Raw connection URL (overrides individual fields above)
  url: ""
  # Existing K8s secret with a "database-url" key (overrides everything above)
  existingSecret: ""

models:
  anthropicApiKey: ""
  anthropicBaseUrl: ""
  anthropicAuthToken: ""
  geminiApiKey: ""

platform:
  # Domain for the platform web UI (e.g. "platform.agentserver.dev").
  # Used for OIDC redirect URLs (auto-derived as https://<domain>).
  domain: ""
  defaultQuotas:
    userMaxWorkspaces: 10
    workspaceMaxSandboxes: 20
    maxSandboxCpu: 2000            # millicores (2000 = 2 cores)
    maxSandboxMemory: 2147483648   # bytes (2Gi)
    maxWorkspaceDriveSize: 10737418240  # bytes (10Gi)
    workspaceMaxTotalCpu: 0        # millicores, 0 = unlimited
    workspaceMaxTotalMemory: 0     # bytes, 0 = unlimited
    workspaceMaxIdleTimeout: 0     # seconds, 0 = unlimited
  auth:
    password:
      enabled: true
    oidc:
      github:
        enabled: false
        clientId: ""
        clientSecret: ""
        # Override OAuth callback base URL (defaults to https://<platform.domain>).
        redirectBaseUrl: ""
        # Comma-separated base domains where GitHub login is shown (empty = all domains).
        allowedDomains: ""
      generic:
        enabled: false
        issuerUrl: ""
        clientId: ""
        clientSecret: ""
        # Comma-separated base domains where SSO login is shown (empty = all domains).
        allowedDomains: ""

sandbox:
  # Base domain for subdomain-based sandbox routing (e.g. "agentserver.dev").
  # Each sandbox gets a subdomain: {prefix}-{sessionID}.{baseDomain}
  baseDomain: ""
  # Additional base domains for multi-domain support (e.g. ["agent.cs.ac.cn"]).
  # Sandbox subdomains will be accessible on all configured domains.
  additionalBaseDomains: []
  # Prefix for per-workspace K8s namespaces (e.g. "agent-ws" → "agent-ws-a1b2c3d4").
  namespacePrefix: "agent-ws"
  # StorageClass for sandbox session volumes (empty = cluster default).
  sessionStorageClassName: ""
  # StorageClass for workspace drive PVCs (empty = falls back to sessionStorageClassName).
  workspaceStorageClassName: ""
  # Size of the session PVC for each sandbox pod.
  sessionStorageSize: "5Gi"
  opencode:
    image: ghcr.io/agentserver/opencode-agent:latest
    runtimeClassName: ""  # e.g. "gvisor" for gVisor isolation
    subdomainPrefix: "code"  # subdomain: {prefix}-{sessionID}.{baseDomain}
    # Opencode config injected into sandbox pods via OPENCODE_CONFIG_CONTENT.
    # Accepts any valid opencode.json fields as structured YAML.
    # The LLM proxy baseURL (provider.anthropic.options.baseURL) is auto-injected
    # from the llmproxy service URL at deploy time.
    config: {}
  openclaw:
    image: ""
    runtimeClassName: ""
    subdomainPrefix: "claw"  # subdomain: {prefix}-{sessionID}.{baseDomain}
    weixinEnabled: false     # Install and enable the official WeChat channel plugin
  claudecode:
    image: ""                # e.g. ghcr.io/agentserver/claudecode-agent:main
    runtimeClassName: ""
  nanoclaw:
    image: ""                # e.g. ghcr.io/agentserver/nanoclaw-agent:v1.2.42
    runtimeClassName: ""
    weixinEnabled: false     # Enable WeChat channel via agentserver bridge
    bridgeBaseUrl: ""        # agentserver internal URL for NanoClaw pod callbacks (e.g. "http://agentserver.agentserver.svc:8080")
    model: ""                # Claude Code model override (e.g. "claude-opus-4-6")
  networkPolicy:
    enabled: false
    # CIDR ranges to deny egress to (internal/private networks).
    denyCIDRs: []

agentSandbox:
  # Set to false to skip installing the agent-sandbox controller (if already installed cluster-wide)
  install: true
  controllerImage: registry.k8s.io/agent-sandbox/agent-sandbox-controller:v0.1.1

modelserver:
  # Connect workspaces to a ModelServer project via OAuth 2.0 (Hydra).
  # When enabled, sandbox LLM traffic routes through llmproxy → ModelServer.
  enabled: false
  oauth:
    clientId: ""
    clientSecret: ""
    authUrl: ""        # Hydra public authorization endpoint (e.g. https://codeapi.cs.ac.cn/oauth2/auth)
    tokenUrl: ""       # Hydra public token endpoint (e.g. https://codeapi.cs.ac.cn/oauth2/token)
    introspectUrl: ""  # Hydra admin introspection endpoint (e.g. http://hydra:4445/admin/oauth2/introspect)
    redirectUri: ""    # OAuth callback URL (auto-derived as https://<platform.domain>/api/auth/modelserver/callback if blank)
  proxyUrl: ""         # ModelServer LLM proxy URL (e.g. https://code.ai.cs.ac.cn)

llmproxy:
  # LLM proxy for token usage tracking and request tracing.
  # The proxy baseURL is auto-injected into sandbox OPENCODE_CONFIG_CONTENT.
  image:
    repository: ghcr.io/agentserver/llmproxy
    tag: latest
    pullPolicy: Always
  # Number of llmproxy replicas (defaults to global replicaCount if not set).
  replicaCount: 1
  # LLM proxy listens on this port inside the container.
  port: 8081
  # LLM proxy uses the same PostgreSQL instance by default (separate database "llmproxy").
  # Set externalDatabaseUrl to use a different database.
  database:
    # Database name created on the shared PostgreSQL instance.
    name: llmproxy
  externalDatabaseUrl: ""
  # Default max requests per day per workspace (0 = unlimited).
  defaultMaxRpd: 0

imbridge:
  image:
    repository: ghcr.io/agentserver/imbridge
    tag: latest
    pullPolicy: Always
  port: 8083

sandboxProxy:
  image:
    repository: ghcr.io/agentserver/sandboxproxy
    tag: latest
    pullPolicy: Always
  replicaCount: 1
  port: 8082

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: nginx
  host: agentserver.example.com
  tls: false

gateway:
  enabled: false
  parentRefs:
    - name: cilium-gateway
      namespace: cilium-gateway
  host: agentserver.example.com
